name: Deploy static site

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      GITHUB_TOKEN: ${{ secrets.GH_STATS_TOKEN || github.token }}
      IMAGE_ASSET_PROVIDER: cloudflare-r2
      R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID || secrets.R2_ACCOUNT_ID }}
      R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME || secrets.R2_BUCKET_NAME }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ vars.R2_ENDPOINT || secrets.R2_BUCKET_NAME}}
      R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL || secrets.R2_PUBLIC_BASE_URL }}
      R2_OBJECT_PREFIX: ${{ vars.R2_OBJECT_PREFIX || secrets.R2_OBJECT_PREFIX}}
      R2_CACHE_MANIFEST_KEY: ${{ vars.R2_CACHE_MANIFEST_KEY || secrets.R2_CACHE_MANIFEST_KEY}}
      SITE_BASE_PATH: ${{ vars.SITE_BASE_PATH || (endsWith(github.event.repository.name, '.github.io') && '/' || format('/{0}/', github.event.repository.name)) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm build:site

      - name: Verify deployment artifact
        run: test -f frontend/dist/index.html

      - name: Verify static files do not contain build secrets
        shell: bash
        run: |
          set -euo pipefail

          search_paths=(frontend/dist data)
          secret_names=(NOTION_TOKEN NOTION_DATABASE_ID GITHUB_TOKEN R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY)

          for secret_name in "${secret_names[@]}"; do
            secret_value="${!secret_name:-}"

            if [[ -n "$secret_value" ]] && grep -R --fixed-strings --quiet -- "$secret_value" "${search_paths[@]}"; then
              echo "::error::${secret_name} was found in static output."
              exit 1
            fi
          done

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
