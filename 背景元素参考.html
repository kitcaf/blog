<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>枯枝珊瑚</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fafafa; }
    canvas { display: block; position: fixed; inset: 0; pointer-events: none; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
  (() => {
    const cvs = document.getElementById('c');
    const ctx = cvs.getContext('2d');
    const W = cvs.width  = window.innerWidth;
    const H = cvs.height = window.innerHeight;

    // offscreen 永久累积
    const off  = document.createElement('canvas');
    const oCtx = off.getContext('2d');
    off.width = W; off.height = H;

    // ── 参数（全部随机，无固定递归深度）──────────────────────────
    const GROW_SPEED   = 0.3;       // px/帧
    const MAX_ACTIVE   = 100;       // 并发活跃枝条上限，防止性能爆炸
    const LEN_MIN      = 6;        // 枝长随机范围
    const LEN_MAX      = 15;
    const CHILD_MIN    = 2;         // 每个节点生出的子枝数随机范围
    const CHILD_MAX    = 5;
    const SPREAD       = 0.7;       // 子枝角度最大偏转范围（弧度），够大才散得开

    // 起点：屏幕左侧偏上
    const OX = W * 0.04;
    const OY = H * 0.22;

    // 活跃枝条池（普通对象数组）
    let pool = [];

    function addBranch(x, y, angle) {
      if (pool.length >= MAX_ACTIVE) return;  // 并发上限，直接丢弃
      const len = LEN_MIN + Math.random() * (LEN_MAX - LEN_MIN);
      const tx  = x + Math.cos(angle) * len;
      const ty  = y + Math.sin(angle) * len;
      pool.push({ x0: x, y0: y, tx, ty, cx: x, cy: y, len, angle, progress: 0, done: false });
    }

    // 到达终点后，从终点随机生出 2~5 条子枝（子枝又是新起点）
    function spawnChildren(b) {
      const count = CHILD_MIN + Math.floor(Math.random() * (CHILD_MAX - CHILD_MIN + 1));
      for (let i = 0; i < count; i++) {
        const childAngle = b.angle + (Math.random() - 0.5) * SPREAD;
        addBranch(b.tx, b.ty, childAngle);
      }
    }

    // 初始从起点发出 3 条主干，角度向右展开
    addBranch(OX, OY, -0.2);
    addBranch(OX, OY,  0.15);
    addBranch(OX, OY,  0.5);

    // ── 主循环 ──────────────────────────────────────────────────
    function tick() {
      requestAnimationFrame(tick);

      const toSpawn = []; // 本帧完成的枝，收集后统一生子

      for (let i = pool.length - 1; i >= 0; i--) {
        const b = pool[i];

        const prevX = b.cx, prevY = b.cy;
        b.progress += GROW_SPEED;

        if (b.progress >= b.len) {
          b.cx = b.tx; b.cy = b.ty;
          b.done = true;
          toSpawn.push(b);
          pool.splice(i, 1); // 移出活跃池
        } else {
          const t = b.progress / b.len;
          b.cx = b.x0 + (b.tx - b.x0) * t;
          b.cy = b.y0 + (b.ty - b.y0) * t;
        }

        // 过界则直接丢弃（不再分叉）——屏幕边缘自然终止
        if (b.cx < -5 || b.cx > W + 5 || b.cy < -5 || b.cy > H + 5) {
          pool.splice(i, 1);
          continue;
        }

        // 画这一小段到 offscreen
        oCtx.beginPath();
        oCtx.moveTo(prevX, prevY);
        oCtx.lineTo(b.cx, b.cy);
        oCtx.strokeStyle = 'rgba(60,64,72,0.09)';
        oCtx.lineWidth   = 0.38;
        oCtx.lineCap     = 'round';
        oCtx.stroke();
      }

      // 统一生子（避免在遍历时修改 pool）
      for (const b of toSpawn) {
        spawnChildren(b);
      }

      // blit
      ctx.clearRect(0, 0, W, H);
      ctx.drawImage(off, 0, 0);
    }

    tick();
  })();
  </script>
</body>
</html>
